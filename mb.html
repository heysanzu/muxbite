<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>muxbite mb — chat agent</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--black:#000;--grey-1:#f5f5f5;--grey-2:#e8e8e8;--grey-3:#d1d1d1;--grey-4:#909090;--grey-5:#444;--grey-6:#1a1a1a;--accent:#c8f135;--orb:'Orbitron',monospace;--sans:'Google Sans',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--white);color:var(--grey-6);margin:0;padding:0;height:100vh}
#app{display:flex;flex-direction:column;height:100vh;background:var(--white)}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--grey-2);background:var(--white)}
.logo{font-family:var(--orb);font-size:14px;font-weight:700;letter-spacing:.12em;color:var(--black);text-transform:lowercase}
.model-select{display:flex;align-items:center;gap:12px}
.model-label{font-size:13px;color:var(--grey-4);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.model-btn{padding:8px 16px;border:1px solid var(--grey-3);border-radius:6px;background:var(--white);color:var(--black);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-transform:lowercase;font-family:var(--sans)}
.model-btn:hover{background:var(--grey-1);border-color:var(--grey-4)}
.model-btn.active{background:var(--black);color:var(--white);border-color:var(--black)}
.chat-area{flex:1;overflow-y:auto;padding:32px 24px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
.msg{display:flex;gap:16px;animation:slide .3s ease-out}
.msg.user{justify-content:flex-end}
.msg.assistant{justify-content:flex-start}
@keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble{max-width:65%;padding:16px 20px;border-radius:12px;line-height:1.6;font-size:15px;word-wrap:break-word}
.bubble.user{background:var(--black);color:var(--white);border-radius:12px 4px 12px 12px}
.bubble.assistant{background:var(--grey-1);color:var(--black);border:1px solid var(--grey-2);border-radius:4px 12px 12px 12px}
.actions{display:flex;align-items:center;gap:8px;margin-top:8px;opacity:0;transition:opacity .2s}
.msg.user:hover .actions{opacity:1}
.action-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--grey-3);border-radius:6px;color:var(--grey-5);cursor:pointer;transition:all .2s}
.action-btn:hover{background:var(--grey-1);border-color:var(--grey-4)}
.action-btn.copy{opacity:1}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--grey-4);text-align:center}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state-text{font-size:14px}
.input-area{border-top:1px solid var(--grey-2);padding:24px;background:var(--white)}
.input-form{display:flex;gap:12px;align-items:flex-end}
.input-field{flex:1;padding:14px 18px;border:1px solid var(--grey-3);border-radius:8px;font-size:15px;font-family:var(--sans);color:var(--black);resize:none;max-height:120px;transition:all .2s}
.input-field:focus{outline:none;border-color:var(--black);box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.input-field::placeholder{color:var(--grey-4)}
.send-btn{width:44px;height:44px;padding:0;border:none;background:var(--black);color:var(--white);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:600}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
@media(max-width:768px){
  .model-select{flex-direction:column;align-items:flex-start;gap:8px}
  .bubble{max-width:85%}
  .header{flex-direction:column;align-items:flex-start;gap:12px}
  .chat-area{padding:16px}
  .input-area{padding:16px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">muxbite</div>
    <div class="model-select">
      <span class="model-label">model</span>
      <button class="model-btn active" data-model="mb1">mb1</button>
      <button class="model-btn" data-model="mb2">mb2</button>
      <button class="model-btn" data-model="mb3">mb3</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-state-icon">◊</div>
      <div class="empty-state-text">start a conversation with mb</div>
    </div>
  </div>
  <div class="input-area">
    <form class="input-form" id="msgForm" onsubmit="handleSend(event)">
      <textarea class="input-field" id="msgInput" placeholder="ask anything..." rows="1"></textarea>
      <button type="submit" class="send-btn" title="send message">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>
</div>

<script>
let currentModel='mb1';
let messages=[];

const modelBtns=document.querySelectorAll('.model-btn');
const chatArea=document.getElementById('chatArea');
const msgForm=document.getElementById('msgForm');
const msgInput=document.getElementById('msgInput');

modelBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    modelBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentModel=btn.dataset.model;
  });
});

msgInput.addEventListener('input',()=>{
  msgInput.style.height='auto';
  msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px';
});

function handleSend(e){
  e.preventDefault();
  const text=msgInput.value.trim();
  if(!text)return;
  
  if(messages.length===0)chatArea.innerHTML='';
  
  messages.push({role:'user',content:text});
  addMessage('user',text);
  msgInput.value='';
  msgInput.style.height='auto';
  
  const btn=msgForm.querySelector('button');
  btn.disabled=true;
  
  setTimeout(()=>{
    const responses={
      mb1:"I'm mb1, your prototype assistant. I understand the fundamentals and I'm here to help you explore ideas. What would you like to discuss?",
      mb2:"I'm mb2, designed to help across 20+ languages. I'm ready to assist with your questions in your preferred language. How can I help?",
      mb3:"I'm mb3, your multimodal companion. I can process text, understand speech, and work with images. What can I help you with today?"
    };
    const reply=responses[currentModel];
    messages.push({role:'assistant',content:reply});
    addMessage('assistant',reply);
    btn.disabled=false;
  },400);
}

function addMessage(role,content){
  const msgDiv=document.createElement('div');
  msgDiv.className='msg '+role;
  
  let html=`<div class="bubble ${role}">${escapeHtml(content)}`;
  
  if(role==='user'){
    html+=`<div class="actions">
      <button class="action-btn" onclick="editMsg(this)" title="edit" type="button">
        <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
      </button>
      <button class="action-btn" onclick="copyMsg(this)" title="copy" type="button">
        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      </button>
    </div>`;
  }else{
    html+=`<div class="actions">
      <button class="action-btn copy" onclick="copyAssistant(this)" title="copy" type="button">
        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      </button>
    </div>`;
  }
  
  html+='</div>';
  msgDiv.innerHTML=html;
  chatArea.appendChild(msgDiv);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function copyMsg(btn){
  const bubble=btn.closest('.bubble');
  const text=bubble.textContent;
  navigator.clipboard.writeText(text.trim());
  const orig=btn.innerHTML;
  btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
  setTimeout(()=>btn.innerHTML=orig,1500);
}

function copyAssistant(btn){
  const bubble=btn.closest('.bubble');
  const text=bubble.textContent;
  navigator.clipboard.writeText(text.trim());
  const orig=btn.innerHTML;
  btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
  setTimeout(()=>btn.innerHTML=orig,1500);
}

function editMsg(btn){
  const bubble=btn.closest('.bubble');
  const text=bubble.textContent.trim();
  msgInput.value=text;
  msgInput.style.height='auto';
  msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px';
  msgInput.focus();
  messages.pop();
  chatArea.removeChild(bubble.closest('.msg'));
}

function escapeHtml(text){
  const map={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return text.replace(/[&<>"']/g,m=>map[m]);
}
</script>
</body>
</html>
