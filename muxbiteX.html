<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUXBITE X — AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray-900: #0a0a0a;
      --gray-800: #111111;
      --gray-700: #1a1a1a;
      --gray-600: #333333;
      --gray-400: #666666;
      --gray-200: #aaaaaa;
      --gray-100: #dddddd;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --font-brand: 'Orbitron', sans-serif;
      --font-body: 'Product Sans', 'Google Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      overflow: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: width 0.15s, height 0.15s;
    }
    .cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
    }

    /* ── NOISE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── TOPBAR ── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar-logo {
      font-family: var(--font-brand);
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
    }

    .topbar-divider {
      width: 1px; height: 16px;
      background: var(--border-bright);
    }

    .topbar-agent {
      font-family: var(--font-brand);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gray-400);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gray-400);
    }

    .status-dot::before {
      content: '';
      width: 6px; height: 6px;
      background: white;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .topbar-btn {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray-400);
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: none;
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    .topbar-btn:hover { color: var(--white); border-color: var(--border-bright); }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--gray-900);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .new-chat-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: none;
      transition: background 0.2s;
      text-align: left;
    }

    .new-chat-btn:hover { background: var(--gray-800); }

    .new-chat-btn span { font-size: 16px; line-height: 1; }

    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar-history::-webkit-scrollbar { width: 3px; }
    .sidebar-history::-webkit-scrollbar-track { background: transparent; }
    .sidebar-history::-webkit-scrollbar-thumb { background: var(--gray-600); border-radius: 2px; }

    .history-item {
      padding: 10px 12px;
      border-radius: 0;
      cursor: none;
      transition: background 0.2s;
      margin-bottom: 2px;
      border-left: 2px solid transparent;
    }

    .history-item:hover { background: var(--gray-800); }
    .history-item.active { background: var(--gray-800); border-left-color: var(--white); }

    .history-title {
      font-size: 12px;
      color: var(--gray-200);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .history-time {
      font-size: 10px;
      color: var(--gray-600);
      letter-spacing: 0.05em;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .sidebar-model {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    .sidebar-model-name {
      font-family: var(--font-brand);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--gray-400);
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── WELCOME ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .welcome::before {
      content: 'X';
      position: absolute;
      font-family: var(--font-brand);
      font-size: 50vw;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.025);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      line-height: 1;
    }

    .welcome-icon {
      font-family: var(--font-brand);
      font-size: 56px;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    .welcome-title {
      font-family: var(--font-brand);
      font-size: clamp(22px, 3vw, 36px);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.35s forwards;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--gray-400);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.5s forwards;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 560px;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.65s forwards;
    }

    .suggestion-btn {
      background: var(--gray-900);
      border: 1px solid var(--border);
      padding: 14px 18px;
      text-align: left;
      cursor: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .suggestion-btn:hover {
      background: var(--gray-800);
      border-color: var(--border-bright);
    }

    .suggestion-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 6px;
    }

    .suggestion-text {
      font-size: 13px;
      color: var(--gray-200);
      line-height: 1.4;
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px 60px;
      display: none;
      flex-direction: column;
      gap: 32px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--gray-600); border-radius: 2px; }

    .chat-area.active { display: flex; }

    .message {
      display: flex;
      gap: 16px;
      max-width: 800px;
      animation: fadeUp 0.4s ease forwards;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .message-avatar {
      width: 32px; height: 32px;
      border: 1px solid var(--border-bright);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-brand);
      font-size: 9px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      color: var(--gray-400);
    }

    .message.user .message-avatar {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
      font-size: 10px;
    }

    .message-body { flex: 1; }

    .message-sender {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 10px;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-100);
    }

    .message.user .message-text {
      background: var(--gray-900);
      border: 1px solid var(--border);
      padding: 12px 18px;
      text-align: right;
    }

    .message-text p + p { margin-top: 12px; }

    .message-text strong { color: var(--white); font-weight: 600; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
    }

    .thinking-dot {
      width: 6px; height: 6px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: thinkPulse 1.2s ease-in-out infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinkPulse {
      0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
      30% { transform: scale(1.4); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 20px 60px 28px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      border: 1px solid var(--border-bright);
      background: var(--gray-900);
      padding: 14px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within { border-color: rgba(255,255,255,0.3); }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      max-height: 160px;
      overflow-y: auto;
    }

    .chat-input::placeholder { color: var(--gray-600); }

    .chat-input::-webkit-scrollbar { width: 2px; }
    .chat-input::-webkit-scrollbar-thumb { background: var(--gray-600); }

    .send-btn {
      background: var(--white);
      border: none;
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      opacity: 0.3;
    }

    .send-btn.active { opacity: 1; }
    .send-btn:hover.active { background: var(--gray-100); }

    .send-btn svg { width: 16px; height: 16px; }

    .input-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 0 2px;
    }

    .input-hint {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gray-600);
    }

    .input-model {
      font-family: var(--font-brand);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--gray-600);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      body { overflow: auto; cursor: auto; }
      .cursor, .cursor-ring { display: none; }
      .app { grid-template-columns: 1fr; grid-template-rows: 56px 1fr auto; height: auto; min-height: 100vh; overflow: hidden; }
      .sidebar { display: none; }
      .main { height: calc(100vh - 56px); }
      .chat-area { padding: 24px 16px; }
      .input-area { padding: 12px 16px 20px; }
      .welcome { padding: 24px 16px; }
      .suggestions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="topbar-logo">MUXBITE</a>
        <div class="topbar-divider"></div>
        <span class="topbar-agent">X · Agent</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot">Online</span>
        <a href="index.html" class="topbar-btn">← Home</a>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <button class="new-chat-btn" onclick="newChat()">
          <span>+</span> New Conversation
        </button>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-label">Recent</p>
      </div>
      <div class="sidebar-history" id="sidebarHistory">
        <!-- populated by JS -->
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-model">Active Model</p>
        <p class="sidebar-model-name">MUXBITE X — v0.1</p>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- WELCOME STATE -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">X</div>
        <h1 class="welcome-title">MUXBITE X</h1>
        <p class="welcome-sub">An AI agent built for depth. Ask anything — research, analysis, ideas, code, or just a conversation.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="fillSuggestion('What is MUXBITE building and why does it matter?')">
            <p class="suggestion-label">Company</p>
            <p class="suggestion-text">What is MUXBITE building and why does it matter?</p>
          </button>
          <button class="suggestion-btn" onclick="fillSuggestion('Explain transformer architecture in simple terms')">
            <p class="suggestion-label">Research</p>
            <p class="suggestion-text">Explain transformer architecture in simple terms</p>
          </button>
          <button class="suggestion-btn" onclick="fillSuggestion('What is the state of Indian language AI models in 2025?')">
            <p class="suggestion-label">Explore</p>
            <p class="suggestion-text">State of Indian language AI models in 2025</p>
          </button>
          <button class="suggestion-btn" onclick="fillSuggestion('Help me think through building a startup from scratch in India')">
            <p class="suggestion-label">Strategy</p>
            <p class="suggestion-text">Help me build a startup from scratch in India</p>
          </button>
        </div>
      </div>

      <!-- CHAT STATE -->
      <div class="chat-area" id="chatArea"></div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Ask MUXBITE X anything..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="input-meta">
          <span class="input-hint">Enter to send · Shift+Enter for new line</span>
          <span class="input-model">MUXBITE X</span>
        </div>
      </div>

    </main>
  </div>

  <script>
    // ── CURSOR ──
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    (function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animateRing);
    })();

    document.querySelectorAll('a, button, textarea').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '16px'; cursor.style.height = '16px';
        ring.style.width = '48px'; ring.style.height = '48px';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '8px'; cursor.style.height = '8px';
        ring.style.width = '32px'; ring.style.height = '32px';
      });
    });

    // ── CHAT STATE ──
    const chatArea = document.getElementById('chatArea');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const sidebarHistory = document.getElementById('sidebarHistory');

    let conversationHistory = [];
    let sessions = [];
    let currentSessionId = null;
    let isThinking = false;

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
      sendBtn.classList.toggle('active', chatInput.value.trim().length > 0);
    });

    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (chatInput.value.trim()) sendMessage();
      }
    });

    function fillSuggestion(text) {
      chatInput.value = text;
      chatInput.dispatchEvent(new Event('input'));
      chatInput.focus();
    }

    function showChat() {
      welcomeScreen.style.display = 'none';
      chatArea.classList.add('active');
    }

    function newChat() {
      conversationHistory = [];
      chatArea.innerHTML = '';
      chatArea.classList.remove('active');
      welcomeScreen.style.display = '';
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendBtn.classList.remove('active');
      currentSessionId = null;
    }

    function addMessage(role, content) {
      showChat();
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? 'YOU' : 'X';

      const body = document.createElement('div');
      body.className = 'message-body';

      const sender = document.createElement('div');
      sender.className = 'message-sender';
      sender.textContent = role === 'user' ? 'You' : 'MUXBITE X';

      const text = document.createElement('div');
      text.className = 'message-text';
      text.innerHTML = formatText(content);

      body.appendChild(sender);
      body.appendChild(text);
      msg.appendChild(avatar);
      msg.appendChild(body);
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;

      return text;
    }

    function addThinking() {
      showChat();
      const msg = document.createElement('div');
      msg.className = 'message assistant';
      msg.id = 'thinkingMsg';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'X';

      const body = document.createElement('div');
      body.className = 'message-body';

      const sender = document.createElement('div');
      sender.className = 'message-sender';
      sender.textContent = 'MUXBITE X';

      const thinking = document.createElement('div');
      thinking.className = 'thinking';
      thinking.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';

      body.appendChild(sender);
      body.appendChild(thinking);
      msg.appendChild(avatar);
      msg.appendChild(body);
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeThinking() {
      const el = document.getElementById('thinkingMsg');
      if (el) el.remove();
    }

    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.06);padding:2px 6px;font-family:monospace;font-size:12px;">$1</code>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }

    function addSidebarSession(firstMessage) {
      const id = Date.now();
      currentSessionId = id;
      const preview = firstMessage.length > 36 ? firstMessage.slice(0, 36) + '…' : firstMessage;
      const item = document.createElement('div');
      item.className = 'history-item active';
      item.id = `session-${id}`;
      item.innerHTML = `
        <div class="history-title">${preview}</div>
        <div class="history-time">Just now</div>
      `;
      // Remove active from others
      sidebarHistory.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
      sidebarHistory.prepend(item);
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isThinking) return;

      isThinking = true;
      sendBtn.classList.remove('active');

      // First message → create session
      if (conversationHistory.length === 0) addSidebarSession(text);

      conversationHistory.push({ role: 'user', content: text });
      addMessage('user', text);

      chatInput.value = '';
      chatInput.style.height = 'auto';
      addThinking();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You are MUXBITE X, the flagship AI agent built by MUXBITE — an AI company founded by Shahnewaz, building proprietary models, datasets, and intelligent products. You are thoughtful, precise, and direct. You communicate in clean, clear prose without excessive formatting. You are proud of being built by MUXBITE and represent the company's ambition to build AI from the ground up in India.`,
            messages: conversationHistory
          })
        });

        const data = await response.json();
        const reply = data.content?.[0]?.text || 'Something went wrong. Please try again.';

        removeThinking();
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply);

      } catch (err) {
        removeThinking();
        addMessage('assistant', 'Connection error. Please check your network and try again.');
      }

      isThinking = false;
      if (chatInput.value.trim()) sendBtn.classList.add('active');
    }
  </script>
</body>
</html>
